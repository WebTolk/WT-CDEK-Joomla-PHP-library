PKG_LIB_WTCDEK_WHATS_NEW="<h3>v.1.3.0. What's new?</h3><ul><li>The library was refactored to an entity-based API with a facade <code>Cdek</code> and a dedicated request layer.</li><li>Support was added for new CDEK API areas, including webhooks, prealert, print forms, payment, passport, reverse logistics, intakes and more.</li><li>Joomla integration was improved: installer script for layouts, new tariff form fields and updated package assets.</li><li>Location methods were expanded, including city suggestions with an optional <code>country_code</code> parameter.</li></ul>"
